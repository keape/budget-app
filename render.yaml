services:
  - type: worker
    name: budget365-social-agent
    env: node
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: node index.js
    rootDir: ./social-agent
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: X_USERNAME
        sync: false
      - key: X_EMAIL
        sync: false
      - key: X_PASSWORD
        sync: false
      - key: FACEBOOK_PAGE_TOKEN
        sync: false
      - key: FACEBOOK_GROUP_ID
        sync: false
      - key: NTFY_TOPIC
        sync: false
      - key: API_BASE_URL
        value: https://budget-app-ios-backend.onrender.com

  - type: web
    name: budget-app-backend
    env: node
    buildCommand: npm ci
    startCommand: npm start
    rootDir: ./server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://budget-app-keape.vercel.app,https://budget-app-three-gules.vercel.app
      - key: ENABLE_ADMIN_ROUTES
        value: "false"
    healthCheckPath: /api/health
